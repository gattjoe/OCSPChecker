# .github/workflows/main.yml

name: build
permissions: {} # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token#defining-access-for-the-github_token-permissions
on:
  push:
    branches:
      - "master"

jobs:
  build:
    if: ${{ (github.repository == 'gattjoe/OCSPChecker') }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
      - name: Set up Python 3.x
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # tag=v6.2.0
        with:
          python-version: "3.13"
          architecture: "x64"
      - name: Install tools
        run: |
          python -m pip install --upgrade pip==26.1.2 setuptools==83.0.0 wheel==0.47.0
          python -m pip install build==1.5.0 twine==6.2.0
      - name: Build pypy package
        run: |
          python -m build
      - name: Check package
        run: |
          twine check dist/*
      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # tag=v4.1.0
        with:
          subject-path: "${{ github.workspace }}/dist"

  publish:
    if: ${{ (github.repository == 'gattjoe/OCSPChecker') }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    needs:
      - build
    environment:
      name: pypi
      url: https://pypi.org/p/ocsp-checker
    steps:
      - name: Download the distribution package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag=v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # tag=v1.14.0
        with:
          verbose: true
