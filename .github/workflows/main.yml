# .github/workflows/main.yml

name: build
permissions: {} # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token#defining-access-for-the-github_token-permissions
on:
  push:
    branches:
      - "master"
    paths:
      - "ocspchecker/**"

jobs:
  build:
    if: ${{ (github.repository == 'gattjoe/OCSPChecker') }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # tag=v7.0.1
      - name: Set up Python 3.x
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # tag=v7.0.0
        with:
          python-version: "3.13"
          architecture: "x64"
      - name: Install tools
        run: |
          python -m pip install --upgrade pip==26.1.2 setuptools==83.0.0 wheel==0.47.0
          python -m pip install build==1.5.0 twine==6.2.0
      - name: Build pypy package
        run: |
          python -m build
      - name: Check package
        run: |
          twine check dist/*
      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # tag=v4.1.1
        with:
          subject-path: "${{ github.workspace }}/dist"

  publish:
    if: ${{ (github.repository == 'gattjoe/OCSPChecker') }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    needs:
      - build
    environment:
      name: pypi
      url: https://pypi.org/p/ocsp-checker
    steps:
      - name: Download the distribution package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag=v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # tag=v1.14.1
        with:
          verbose: true
