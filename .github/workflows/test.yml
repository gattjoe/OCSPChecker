name: test
permissions: {} # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token#defining-access-for-the-github_token-permissions
on:
  push:
    branches:
      - "*"
      - "!master"
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}-python${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os:
          [
            ubuntu-22.04,
            ubuntu-24.04,
            windows-2022,
            macos-13,
            macos-14,
            macos-15,
          ]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # tag=v7.0.1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # tag=v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: |
          python -m pip install --upgrade pip==26.1.2 setuptools==83.0.0 wheel==0.47.0
      - name: Install ocspchecker
        run: |
          python -m pip install .
      - name: Install pytest
        run: |
          python -m pip install -r dev-requirements.txt
      - name: Run pytest
        run: |
          pytest tests/test_ocspchecker.py -v --junitxml=test-output-${{ matrix.os }}-python${{ matrix.python-version }}.xml
      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: pytest-results for ${{ matrix.os }}-python${{ matrix.python-version }}
          path: "**/test-output-${{ matrix.os }}-python${{ matrix.python-version }}.xml"
        if: ${{ always() }}
